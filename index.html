<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Al Badariyya Caters</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

header{
background:#b22222;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

nav{
display:flex;
background:#fff;
border-bottom:1px solid #ddd;
}

nav button{
flex:1;
padding:12px;
border:none;
background:white;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input,textarea,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#b22222;
color:white;
border:none;
padding:10px;
border-radius:6px;
}

.customer{
background:white;
padding:10px;
border-radius:8px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.actions button{
margin-right:5px;
font-size:12px;
padding:6px 10px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
}

.brand{
text-align:center;
font-size:12px;
color:#777;
margin-top:15px;
}

</style>

</head>

<body>

<header>Al Badariyya Caters</header>

<nav>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('customers')">Customers</button>
<button onclick="show('menu')">Menu</button>

</nav>

<div class="container">

<!-- DASHBOARD -->

<div id="dashboard">

<div class="stats">

<div class="stat">
<b>Total Orders</b>
<p id="orders">0</p>
</div>

<div class="stat">
<b>Total Advance</b>
<p id="income">₹0</p>
</div>

<div class="stat">
<b>Pending Balance</b>
<p id="pending">₹0</p>
</div>

<div class="stat">
<b>Customers</b>
<p id="customersCount">0</p>
</div>

</div>

</div>

<!-- CUSTOMER SECTION -->

<div id="customers" style="display:none">

<div class="card">

<h3>Add Booking</h3>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">

<input id="date" type="date">

<select id="menuSelect">

<option>Chicken Biriyani</option>
<option>Alfaham</option>
<option>Kuzhimanthi</option>
<option>Mandhi</option>
<option>Meals</option>

</select>

<input id="total" type="number" placeholder="Total Amount">

<input id="advance" type="number" placeholder="Advance">

<input id="balance" placeholder="Balance" readonly>

<textarea id="note" placeholder="Order Note"></textarea>

<button onclick="saveCustomer()">Save Booking</button>

</div>

<input id="search" placeholder="Search customer..." onkeyup="render()">

<div id="customerList"></div>

</div>

<!-- MENU SECTION -->

<div id="menu" style="display:none">

<div class="card">

<h3>Al Badariyya Caters Menu</h3>

<ul>

<li>Chicken Biriyani</li>
<li>Alfaham</li>
<li>Kuzhimanthi</li>
<li>Mandhi</li>
<li>Meals</li>
<li>Beef Curry</li>

</ul>

</div>

</div>

<div class="brand">Al Badariyya Caters • Catering Management</div>

</div>

<script>

let customers=JSON.parse(localStorage.getItem("albadariyya"))||[]

let editIndex=-1

function show(page){

dashboard.style.display="none"
customersDiv=document.getElementById("customers")
customersDiv.style.display="none"
menu.style.display="none"

document.getElementById(page).style.display="block"

}

total.oninput=calc
advance.oninput=calc

function calc(){

balance.value=(total.value||0)-(advance.value||0)

}

function saveCustomer(){

let c={

name:name.value,
phone:phone.value,
date:date.value,
menu:menuSelect.value,
total:Number(total.value),
advance:Number(advance.value),
balance:Number(balance.value),
note:note.value

}

if(editIndex==-1){

customers.push(c)

}else{

customers[editIndex]=c
editIndex=-1

}

localStorage.setItem("albadariyya",JSON.stringify(customers))

clearForm()

render()

}

function render(){

let list=document.getElementById("customerList")

let search=document.getElementById("search").value.toLowerCase()

list.innerHTML=""

let income=0
let pending=0

customers.forEach((c,i)=>{

if(c.name.toLowerCase().includes(search)||c.phone.includes(search)){

list.innerHTML+=`

<div class="customer">

<b>${c.name}</b><br>

${c.menu} • ${c.date}<br>

Total ₹${c.total} | Balance ₹${c.balance}

<div class="actions">

<button onclick="editCustomer(${i})">Edit</button>

<button onclick="deleteCustomer(${i})">Delete</button>

<button onclick="whatsapp('${c.phone}',${c.balance})">WhatsApp</button>

</div>

</div>

`

}

income+=c.advance
pending+=c.balance

})

orders.innerText=customers.length
customersCount.innerText=customers.length
income.innerText="₹"+income
pending.innerText="₹"+pending

}

function editCustomer(i){

let c=customers[i]

name.value=c.name
phone.value=c.phone
date.value=c.date
menuSelect.value=c.menu
total.value=c.total
advance.value=c.advance
balance.value=c.balance
note.value=c.note

editIndex=i

window.scrollTo(0,0)

}

function deleteCustomer(i){

customers.splice(i,1)

localStorage.setItem("albadariyya",JSON.stringify(customers))

render()

}

function whatsapp(phone,balance){

let msg=`Al Badariyya Caters Invoice Balance ₹${balance}`

window.open("https://wa.me/91"+phone+"?text="+encodeURIComponent(msg))

}

function clearForm(){

document.querySelectorAll("input,textarea").forEach(e=>e.value="")

}

render()

</script>

</body>
</html>
