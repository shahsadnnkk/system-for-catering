<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Al Badariyya Caters</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#b22222;
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.sub{
text-align:center;
font-size:13px;
opacity:.9;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.title{
font-weight:bold;
margin-bottom:10px;
}

input,textarea{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#b22222;
color:white;
font-size:16px;
margin-top:5px;
}

button:hover{
background:#8b0000;
}

.customerCard{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.row{
display:flex;
justify-content:space-between;
margin-top:6px;
}

.actions button{
width:auto;
padding:6px 10px;
font-size:13px;
margin-right:5px;
}

.brand{
text-align:center;
margin-top:20px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<header>
Al Badariyya Caters
<div class="sub">Catering Management Dashboard</div>
</header>

<div class="container">

<div class="card">

<div class="title">Add / Edit Customer</div>

<input id="name" placeholder="Customer Name">

<input id="phone" placeholder="Phone Number">

<input id="date" type="date">

<textarea id="order" placeholder="Order Details"></textarea>

<button onclick="saveCustomer()">Save Customer</button>

</div>

<div class="card">

<div class="title">Customer Bookings</div>

<div id="customerList"></div>

</div>

<div class="brand">
Al Badariyya Caters • Professional Catering Management
</div>

</div>

<script>

let customers = JSON.parse(localStorage.getItem("albadariyya_data")) || []

let editIndex = -1

function saveCustomer(){

let c = {

name:name.value,
phone:phone.value,
date:date.value,
order:order.value

}

if(editIndex === -1){

customers.push(c)

}else{

customers[editIndex] = c
editIndex = -1

}

localStorage.setItem("albadariyya_data",JSON.stringify(customers))

clearForm()

render()

}

function render(){

let list = document.getElementById("customerList")

list.innerHTML=""

customers.forEach((c,i)=>{

list.innerHTML+=`

<div class="customerCard">

<b>${c.name}</b>

<div>${c.phone}</div>

<div>${c.date}</div>

<div style="font-size:13px;color:#555">${c.order}</div>

<div class="row actions">

<button onclick="editCustomer(${i})">Edit</button>

<button onclick="deleteCustomer(${i})">Delete</button>

</div>

</div>

`

})

}

function editCustomer(i){

let c = customers[i]

name.value=c.name
phone.value=c.phone
date.value=c.date
order.value=c.order

editIndex=i

window.scrollTo(0,0)

}

function deleteCustomer(i){

customers.splice(i,1)

localStorage.setItem("albadariyya_data",JSON.stringify(customers))

render()

}

function clearForm(){

document.querySelectorAll("input,textarea").forEach(e=>e.value="")

}

render()

</script>

</body>
</html>
